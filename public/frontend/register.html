<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Member Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h2>Member Registration</h2>
        
        <form action="register.php" method="post" class="registration-form">
            <div class="form-group">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" required placeholder="Enter your last name">
            </div>

            <div class="form-group">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" required placeholder="Enter your first name">
            </div>

            <div class="form-group">
                <label for="address">Mailing Address</label>
                <input type="text" id="address" name="address" required placeholder="Enter your mailing address">
            </div>

            <div class="form-group">
                <label for="phone">Contact Phone</label>
                <input type="tel" id="phone" name="phone" required placeholder="(852) 1234-5678" pattern="[0-9]{4}-[0-9]{4}">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="your.email@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter a secure password" minlength="8">
                <small class="form-hint">Minimum 8 characters</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Register</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>

        <div class="navigation-buttons">
            <button onclick="window.location.href='index.html'" class="btn btn-outline">← Back to Introduction</button>
            <button onclick="window.location.href='login.html'" class="btn btn-outline">Login to Reserve →</button>
        </div>
    </div>

</body>

</html>
