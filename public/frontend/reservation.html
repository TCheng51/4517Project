<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Reservation</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">
        <h2>Make a Reservation</h2>
        
        <form action="reserve.php" method="post" class="registration-form">
            <div class="form-group">
                <label for="reservation_date">Date</label>
                <input type="date" id="reservation_date" name="reservation_date" required>
            </div>

            <div class="form-group">
                <label for="time_slot">Time Slot</label>
                <select id="time_slot" name="time_slot">
                    <option>2:00 – 4:00 PM</option>
                    <option>6:00 – 9:00 PM</option>
                </select>
            </div>

            <div class="form-group">
                <label for="table_room">Select Table / Room</label>
                <select id="table_room" name="table_room">
                    <option>Standard Table (4 players)</option>
                    <option>Premium Table (6 players)</option>
                    <option>Private Room – Dragon's Den (8 players)</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Reserve</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>

        <div class="navigation-buttons">
            <button onclick="window.location.href='index.html'" class="btn btn-outline">← Back to Introduction</button>
            <button onclick="window.location.href='register.html'" class="btn btn-outline">Member Registration</button>
            <button onclick="window.location.href='login.html'" class="btn btn-outline">Login to Reserve</button>
        </div>
    </div>

</body>

</html>
